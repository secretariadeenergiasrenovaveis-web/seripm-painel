<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo SERIPM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased">

    <!-- Ecrã de Login -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-xl w-96 border border-slate-200">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">SERIPM 2026</h2>
            <input type="text" id="user" placeholder="Utilizador" class="w-full p-3 mb-4 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" id="pass" placeholder="Palavra-passe" class="w-full p-3 mb-6 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="fazerLogin()" class="w-full bg-blue-800 text-white p-3 rounded-lg font-bold hover:bg-blue-900 transition">ENTRAR</button>
        </div>
    </div>

    <!-- Painel Principal -->
    <div id="dashboard" class="hidden flex h-screen">
        <!-- Menu Lateral -->
        <aside class="w-64 bg-slate-900 text-white p-6 flex flex-col h-full">
            <h1 class="text-xl font-bold mb-8 border-b border-slate-700 pb-4">SERIPM 2026</h1>
            <nav id="menu-nav" class="space-y-2 flex-1 overflow-y-auto no-scrollbar">
                <!-- Botões gerados via script consoante as permissões -->
            </nav>
            <button onclick="logout()" class="text-red-400 hover:text-red-300 mt-auto pt-4 border-t border-slate-700 w-full text-left">
                <i class="fas fa-sign-out-alt mr-2"></i> Sair
            </button>
        </aside>

        <!-- Área de Conteúdo -->
        <main class="flex-1 p-8 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <h2 id="tab-title" class="text-2xl font-bold text-slate-800">Painel Principal</h2>
                <span id="display-user" class="bg-white px-4 py-2 rounded-lg shadow-sm font-medium"></span>
            </header>
            <div id="content-area" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] overflow-x-auto">
                <p class="text-slate-500">Bem-vindo ao sistema. Selecione um setor no menu lateral para visualizar os dados.</p>
            </div>
        </main>
    </div>

    <script>
        // URL da sua implantação do Apps Script (já configurada)
        const API_URL = "https://script.google.com/macros/s/AKfycbz6wLfSYiLQqlGycytiMrX4ieVOGTnq9B8r2hpZToOlCpygK16voVbGsw9C6XrbGskp/exec";
        const ALL_TABS = ['ENTRADA', 'ADMINISTRATIVO', 'SUPERVISOR', 'COM FUNCIONÁRIO', 'IMPLANTAÇÃO', 'OBRA', 'GARANTIA', 'USUÁRIOS'];

        // Verifica a sessão ao abrir a página
        window.onload = () => {
            const savedUser = localStorage.getItem('seripm_user');
            if (savedUser) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('display-user').innerText = "Utilizador: " + savedUser;
                construirMenu();
            }
        };

        // Função de Autenticação
        async function fazerLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            if (!u || !p) { alert("Preencha todos os campos."); return; }

            const btn = document.querySelector('button');
            btn.innerText = "A ENTRAR...";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "login", username: u, password: p })
                });
                const result = await response.json();

                if (result.success) {
                    // Normalização do perfil: Transforma "Super Administrador" em "SUPERVISOR"
                    let perfil = result.role ? result.role.toUpperCase() : "";
                    if (perfil === 'SUPER ADMINISTRADOR' || perfil === 'ADMINISTRADOR') {
                        perfil = 'SUPERVISOR';
                    }

                    localStorage.setItem('seripm_user', result.username);
                    localStorage.setItem('seripm_role', perfil);
                    localStorage.setItem('seripm_tabs', result.allowedTabs || ""); // Previne erros de "null"
                    location.reload();
                } else {
                    alert("Erro: " + result.error);
                    btn.innerText = "ENTRAR";
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Erro ao conectar com o servidor. Verifique a URL do Web App.");
                console.error(e);
                btn.innerText = "ENTRAR";
                btn.disabled = false;
            }
        }

        // Construção dinâmica do menu
        function construirMenu() {
            const nav = document.getElementById('menu-nav');
            const role = localStorage.getItem('seripm_role');
            const allowedRaw = localStorage.getItem('seripm_tabs') || "";
            const allowed = allowedRaw.split(',').map(s => s.trim().toUpperCase());
            
            let abasAdicionadas = 0;

            ALL_TABS.forEach(aba => {
                // Se o utilizador é SUPERVISOR ou a aba está nas permissões dele
                if (role === 'SUPERVISOR' || allowed.includes(aba.toUpperCase())) {
                    const btn = document.createElement('button');
                    btn.className = "block w-full text-left p-3 hover:bg-blue-800 rounded transition font-medium mb-1";
                    btn.innerText = aba;
                    btn.onclick = () => trocarAba(aba);
                    nav.appendChild(btn);
                    abasAdicionadas++;
                }
            });

            if (abasAdicionadas === 0) {
                nav.innerHTML = `<p class="text-sm text-red-300 p-2">Nenhuma aba configurada para o perfil: ${role}</p>`;
            } else {
                // Auto-carregar a primeira aba disponível para não deixar a tela em branco
                const primeiroBotao = nav.querySelector('button');
                if (primeiroBotao) {
                    primeiroBotao.click();
                }
            }
        }

        // Troca de Abas e Busca de Dados
        async function trocarAba(aba) {
            document.getElementById('tab-title').innerText = aba;
            const content = document.getElementById('content-area');
            content.innerHTML = `<p class="text-slate-500 animate-pulse">A carregar dados de ${aba}...</p>`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: aba === 'USUÁRIOS' ? 'getUsers' : 'getProtocols', 
                        tab: aba, 
                        role: localStorage.getItem('seripm_role'),
                        allowedTabs: localStorage.getItem('seripm_tabs') || "",
                        username: localStorage.getItem('seripm_user')
                    })
                });
                
                const result = await response.json();

                if (result.success) {
                    renderizarTabela(result.data, content);
                } else {
                    content.innerHTML = `<p class="text-red-500">Erro: ${result.error}</p>`;
                }
            } catch (e) {
                console.error(e);
                content.innerHTML = `<p class="text-red-500">Erro de ligação ao servidor.</p>`;
            }
        }

        // Renderização dinâmica da tabela HTML
        function renderizarTabela(dados, container) {
            if (!dados || dados.length === 0) { 
                container.innerHTML = "<p class='text-slate-500'>Nenhum registo encontrado nesta aba.</p>"; 
                return; 
            }
            
            let html = `<table class="w-full text-sm text-left border-collapse whitespace-nowrap"><thead class="bg-slate-800 text-white"><tr>`;
            
            // Cria os cabeçalhos a partir das chaves do objeto JSON
            Object.keys(dados[0]).forEach(k => html += `<th class="px-4 py-3 border border-slate-700">${k}</th>`);
            html += `</tr></thead><tbody>`;
            
            // Preenche as linhas com os valores
            dados.forEach(row => {
                html += `<tr class="border-b hover:bg-slate-50 transition">`;
                Object.values(row).forEach(v => html += `<td class="px-4 py-2 border border-slate-200">${v || '-'}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            
            container.innerHTML = html;
        }

        // Encerrar Sessão
        function logout() { 
            localStorage.clear(); 
            location.reload(); 
        }
    </script>
</body>
</html>
