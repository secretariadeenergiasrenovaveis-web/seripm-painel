<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERIPM - Atendimento ao Cidadão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Animação suave para os modais */
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-hidden">

    <!-- Ecrã de Login -->
    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-8">
                <div class="bg-blue-600 text-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fas fa-city text-3xl"></i>
                </div>
                <h2 class="text-3xl font-bold text-slate-800">SERIPM</h2>
                <p class="text-slate-500 mt-2">Portal de Atendimento ao Cidadão</p>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Utilizador</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-slate-400"></i>
                        </div>
                        <input type="text" id="user" class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition outline-none" placeholder="O seu utilizador">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Palavra-passe</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-slate-400"></i>
                        </div>
                        <input type="password" id="pass" class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition outline-none" placeholder="••••••••">
                    </div>
                </div>
                <button onclick="fazerLogin()" id="btn-login" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold shadow-md hover:bg-blue-700 hover:shadow-lg transition flex justify-center items-center gap-2">
                    <span>Aceder ao Sistema</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Layout do Sistema (Dashboard) -->
    <div id="dashboard" class="hidden h-screen flex overflow-hidden bg-slate-50">
        
        <!-- Sidebar -->
        <aside class="w-72 bg-slate-900 text-white flex flex-col shadow-2xl z-20">
            <div class="p-6 border-b border-slate-800 flex items-center gap-3">
                <div class="bg-blue-500 text-white w-10 h-10 rounded-lg flex items-center justify-center shadow-md">
                    <i class="fas fa-city text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">SERIPM</h1>
                    <p class="text-xs text-slate-400 uppercase tracking-wider">Gestão 2026</p>
                </div>
            </div>

            <div class="p-4">
                <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-3 ml-2">Departamentos</p>
                <nav id="menu-nav" class="space-y-1 overflow-y-auto no-scrollbar max-h-[60vh]">
                    <!-- Botões gerados dinamicamente -->
                </nav>
            </div>

            <div class="mt-auto p-4 border-t border-slate-800 bg-slate-900">
                <div class="flex items-center gap-3 mb-4 px-2">
                    <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center text-lg font-bold text-slate-300">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="overflow-hidden">
                        <p id="display-user" class="text-sm font-semibold truncate text-white"></p>
                        <p id="display-role" class="text-xs text-blue-400 truncate"></p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-red-400 hover:bg-red-500 hover:text-white rounded-lg transition flex items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> Encerrar Sessão
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden relative">
            
            <!-- Top Header -->
            <header class="bg-white shadow-sm z-10 p-4 md:p-6 flex justify-between items-center border-b border-slate-200">
                <h2 id="tab-title" class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <i class="fas fa-layer-group text-blue-600"></i> <span id="title-text">Painel Principal</span>
                </h2>
                
                <div class="flex gap-3">
                    <button class="bg-white border border-slate-300 text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-50 transition shadow-sm" onclick="trocarAba(currentTab)">
                        <i class="fas fa-sync-alt"></i> Atualizar
                    </button>
                    <!-- O botão Novo Protocolo aparecerá apenas na aba ENTRADA ou se necessário -->
                    <button id="btn-novo-protocolo" class="hidden bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition shadow-md flex items-center gap-2 font-medium" onclick="abrirModalNovo()">
                        <i class="fas fa-plus"></i> Novo Protocolo
                    </button>
                </div>
            </header>

            <!-- Scrollable Content Area -->
            <div class="flex-1 overflow-y-auto p-6" id="main-scroll-area">
                
                <!-- KPI Cards (Resumo) -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="kpi-container">
                    <!-- Gerados via JS -->
                </div>

                <!-- Tabela e Ferramentas -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col">
                    <div class="p-5 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50/50 rounded-t-xl">
                        <h3 class="text-lg font-semibold text-slate-700">Registos Encontrados</h3>
                        <div class="relative w-full md:w-72">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-search text-slate-400"></i>
                            </div>
                            <input type="text" id="search-input" onkeyup="filtrarTabela()" class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-600 outline-none" placeholder="Pesquisar em todas as colunas...">
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <div id="content-area" class="min-h-[300px] w-full">
                            <div class="flex flex-col items-center justify-center h-64 text-slate-400">
                                <i class="fas fa-hand-pointer text-4xl mb-4 text-slate-300"></i>
                                <p>Selecione um departamento no menu lateral.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL: Visualizar Detalhes -->
    <div id="modal-detalhes" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col transform scale-95 transition-transform duration-300" id="modal-box">
            
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-2xl">
                <div>
                    <h3 class="text-xl font-bold text-slate-800">Detalhes do Protocolo</h3>
                    <p class="text-sm text-slate-500 mt-1" id="modal-subtitle">Informação completa</p>
                </div>
                <button onclick="fecharModal()" class="text-slate-400 hover:text-red-500 bg-white hover:bg-red-50 p-2 rounded-full transition">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto" id="modal-body">
                <!-- Conteúdo injetado via JS -->
            </div>
            
            <div class="p-4 border-t border-slate-100 bg-slate-50 rounded-b-2xl flex justify-end gap-3">
                <button onclick="fecharModal()" class="px-5 py-2 text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-100 font-medium transition">
                    Fechar
                </button>
                <button class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium transition flex items-center gap-2 shadow-sm">
                    <i class="fas fa-print"></i> Imprimir
                </button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES GERAIS
        const API_URL = "https://script.google.com/macros/s/AKfycbz6wLfSYiLQqlGycytiMrX4ieVOGTnq9B8r2hpZToOlCpygK16voVbGsw9C6XrbGskp/exec";
        const ALL_TABS = ['ENTRADA', 'ADMINISTRATIVO', 'SUPERVISOR', 'COM FUNCIONÁRIO', 'IMPLANTAÇÃO', 'OBRA', 'GARANTIA', 'USUÁRIOS'];
        
        // Ícones para o menu
        const TAB_ICONS = {
            'ENTRADA': 'fa-inbox',
            'ADMINISTRATIVO': 'fa-folder-open',
            'SUPERVISOR': 'fa-user-tie',
            'COM FUNCIONÁRIO': 'fa-users-cog',
            'IMPLANTAÇÃO': 'fa-tools',
            'OBRA': 'fa-hard-hat',
            'GARANTIA': 'fa-shield-alt',
            'USUÁRIOS': 'fa-users'
        };

        let currentData = []; // Armazena os dados atuais da aba
        let currentTab = "";

        // INICIALIZAÇÃO
        window.onload = () => {
            const savedUser = localStorage.getItem('seripm_user');
            if (savedUser) {
                iniciarSessao(savedUser, localStorage.getItem('seripm_role'));
            }
        };

        // LOGIN E SESSÃO
        async function fazerLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const btn = document.getElementById('btn-login');
            
            if (!u || !p) { alert("Preencha as suas credenciais."); return; }

            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> A validar...`;
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "login", username: u, password: p })
                });
                const result = await response.json();

                if (result.success) {
                    let perfil = result.role ? result.role.toUpperCase() : "";
                    if (perfil === 'SUPER ADMINISTRADOR' || perfil === 'ADMINISTRADOR') perfil = 'SUPERVISOR';

                    localStorage.setItem('seripm_user', result.username);
                    localStorage.setItem('seripm_role', perfil);
                    localStorage.setItem('seripm_tabs', result.allowedTabs || "");
                    
                    iniciarSessao(result.username, perfil);
                } else {
                    alert("Erro: " + result.error);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Erro de comunicação com a base de dados.");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function iniciarSessao(username, role) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            
            document.getElementById('display-user').innerText = username.toUpperCase();
            document.getElementById('display-role').innerText = role;
            
            construirMenu();
        }

        function logout() { 
            localStorage.clear(); 
            location.reload(); 
        }

        // CONSTRUÇÃO DA INTERFACE (MENU)
        function construirMenu() {
            const nav = document.getElementById('menu-nav');
            nav.innerHTML = ''; // Limpa menu
            
            const role = localStorage.getItem('seripm_role');
            const allowedRaw = localStorage.getItem('seripm_tabs') || "";
            const allowed = allowedRaw.split(',').map(s => s.trim().toUpperCase());
            
            let abasAdicionadas = 0;

            ALL_TABS.forEach(aba => {
                if (role === 'SUPERVISOR' || allowed.includes(aba.toUpperCase())) {
                    const icone = TAB_ICONS[aba.toUpperCase()] || 'fa-file-alt';
                    
                    const btn = document.createElement('button');
                    btn.id = `btn-menu-${aba}`;
                    btn.className = "w-full text-left px-4 py-3 rounded-xl transition flex items-center gap-3 font-medium mb-1 text-slate-300 hover:bg-slate-800 hover:text-white";
                    btn.innerHTML = `<i class="fas ${icone} w-5 text-center text-slate-400 group-hover:text-blue-400"></i> <span>${aba}</span>`;
                    btn.onclick = () => trocarAba(aba);
                    nav.appendChild(btn);
                    abasAdicionadas++;
                }
            });

            if (abasAdicionadas > 0) {
                const primeiroBotao = nav.querySelector('button');
                if (primeiroBotao) primeiroBotao.click();
            } else {
                nav.innerHTML = `<div class="p-3 bg-red-900/30 text-red-400 text-sm rounded-lg border border-red-800/50">Sem acesso a departamentos configurado.</div>`;
            }
        }

        // ATUALIZAÇÃO ESTADO ATIVO DO MENU
        function atualizarMenuAtivo(aba) {
            document.querySelectorAll('#menu-nav button').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
                btn.classList.add('text-slate-300', 'hover:bg-slate-800');
                btn.querySelector('i').classList.remove('text-white');
                btn.querySelector('i').classList.add('text-slate-400');
            });
            
            const btnAtivo = document.getElementById(`btn-menu-${aba}`);
            if (btnAtivo) {
                btnAtivo.classList.remove('text-slate-300', 'hover:bg-slate-800');
                btnAtivo.classList.add('bg-blue-600', 'text-white', 'shadow-md');
                btnAtivo.querySelector('i').classList.remove('text-slate-400');
                btnAtivo.querySelector('i').classList.add('text-white');
            }
        }

        // BUSCA DE DADOS
        async function trocarAba(aba) {
            if (!aba) return;
            currentTab = aba;
            atualizarMenuAtivo(aba);
            
            document.getElementById('title-text').innerText = aba;
            
            // Lógica do botão "Novo Protocolo"
            const btnNovo = document.getElementById('btn-novo-protocolo');
            if (aba === 'ENTRADA' || aba === 'OBRA') btnNovo.classList.remove('hidden');
            else btnNovo.classList.add('hidden');

            const content = document.getElementById('content-area');
            content.innerHTML = `
                <div class="flex flex-col items-center justify-center h-64 text-slate-400">
                    <i class="fas fa-circle-notch fa-spin text-4xl mb-4 text-blue-500"></i>
                    <p class="font-medium animate-pulse">A extrair dados de ${aba}...</p>
                </div>`;
            
            document.getElementById('kpi-container').innerHTML = ''; // Limpa KPIs

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: aba === 'USUÁRIOS' ? 'getUsers' : 'getProtocols', 
                        tab: aba, 
                        role: localStorage.getItem('seripm_role'),
                        allowedTabs: localStorage.getItem('seripm_tabs') || "",
                        username: localStorage.getItem('seripm_user')
                    })
                });
                
                const result = await response.json();

                if (result.success) {
                    currentData = result.data; // Guarda globalmente
                    gerarKPIs(currentData);
                    renderizarTabela(currentData, content);
                } else {
                    content.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-64 text-red-500">
                            <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
                            <p class="font-medium">Erro: ${result.error}</p>
                        </div>`;
                }
            } catch (e) {
                content.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-red-500">
                        <i class="fas fa-wifi text-4xl mb-4"></i>
                        <p class="font-medium">Falha de ligação ao servidor.</p>
                    </div>`;
            }
        }

        // GERAÇÃO DE KPIs (Resumo Rápido)
        function gerarKPIs(dados) {
            const container = document.getElementById('kpi-container');
            if (!dados || dados.length === 0) return;

            let total = dados.length;
            let abertos = 0;
            let concluidos = 0;

            dados.forEach(row => {
                const statusStr = JSON.stringify(row).toUpperCase();
                if (statusStr.includes('"STATUS":"ABERTO"') || statusStr.includes('"STATUS":"PENDENTE"')) abertos++;
                if (statusStr.includes('"STATUS":"RESOLVIDO"') || statusStr.includes('"STATUS":"CONCLUÍDO"')) concluidos++;
            });

            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-xl"><i class="fas fa-file-alt"></i></div>
                    <div><p class="text-sm text-slate-500 font-medium">Total Registos</p><p class="text-2xl font-bold text-slate-800">${total}</p></div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-amber-100 flex items-center justify-center text-amber-600 text-xl"><i class="fas fa-exclamation-circle"></i></div>
                    <div><p class="text-sm text-slate-500 font-medium">Em Aberto / Pendentes</p><p class="text-2xl font-bold text-slate-800">${abertos}</p></div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 text-xl"><i class="fas fa-check-circle"></i></div>
                    <div><p class="text-sm text-slate-500 font-medium">Resolvidos</p><p class="text-2xl font-bold text-slate-800">${concluidos}</p></div>
                </div>
            `;
        }

        // RENDERIZAÇÃO DA TABELA (ESTILO SISTEMA)
        function renderizarTabela(dados, container) {
            if (!dados || dados.length === 0) { 
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-slate-400">
                        <i class="fas fa-folder-open text-4xl mb-4 text-slate-200"></i>
                        <p class="font-medium">Nenhum registo encontrado neste departamento.</p>
                    </div>`; 
                return; 
            }
            
            let html = `<table class="w-full text-sm text-left whitespace-nowrap" id="data-table">
                            <thead class="bg-slate-50 text-slate-600 text-xs uppercase font-semibold border-b border-slate-200 sticky top-0">
                                <tr>`;
            
            const colunas = Object.keys(dados[0]);
            
            colunas.forEach(k => html += `<th class="px-6 py-4">${k}</th>`);
            html += `<th class="px-6 py-4 text-right">Ações</th></tr></thead><tbody class="divide-y divide-slate-100 text-slate-700">`;
            
            dados.forEach((row, index) => {
                html += `<tr class="hover:bg-blue-50/50 transition cursor-pointer group" onclick="abrirDetalhes(${index})">`;
                
                colunas.forEach(k => {
                    let valor = row[k] || '-';
                    // Sistema de Cores para Status
                    if (k.toUpperCase() === 'STATUS') {
                        valor = formatarStatus(valor);
                    }
                    html += `<td class="px-6 py-4">${valor}</td>`;
                });
                
                html += `<td class="px-6 py-4 text-right">
                            <button class="text-blue-600 hover:text-blue-800 hover:bg-blue-100 p-2 rounded-lg transition" onclick="event.stopPropagation(); abrirDetalhes(${index});">
                                <i class="fas fa-eye"></i> Visualizar
                            </button>
                         </td></tr>`;
            });
            html += `</tbody></table>`;
            
            container.innerHTML = html;
        }

        // FUNÇÃO AUXILIAR: Estilizar Badges de Status
        function formatarStatus(status) {
            const s = String(status).toUpperCase().trim();
            if (s === 'ABERTO') return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800"><span class="w-1.5 h-1.5 bg-amber-500 rounded-full mr-1.5"></span>${status}</span>`;
            if (s === 'RESOLVIDO' || s === 'CONCLUÍDO') return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800"><span class="w-1.5 h-1.5 bg-emerald-500 rounded-full mr-1.5"></span>${status}</span>`;
            if (s === 'ENCAMINHADO' || s === 'EM ANDAMENTO') return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800"><span class="w-1.5 h-1.5 bg-blue-500 rounded-full mr-1.5"></span>${status}</span>`;
            return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-800">${status}</span>`;
        }

        // PESQUISA NA TABELA
        function filtrarTabela() {
            const input = document.getElementById('search-input');
            const filter = input.value.toUpperCase();
            const table = document.getElementById('data-table');
            if (!table) return;
            const tr = table.getElementsByTagName('tr');

            for (let i = 1; i < tr.length; i++) { // Ignora cabeçalho
                let visible = false;
                const td = tr[i].getElementsByTagName('td');
                for (let j = 0; j < td.length - 1; j++) { // Ignora coluna Ações
                    if (td[j]) {
                        if (td[j].innerText.toUpperCase().indexOf(filter) > -1) {
                            visible = true;
                            break;
                        }
                    }
                }
                tr[i].style.display = visible ? "" : "none";
            }
        }

        // MODAL DE DETALHES
        function abrirDetalhes(index) {
            const rowData = currentData[index];
            if (!rowData) return;

            const modal = document.getElementById('modal-detalhes');
            const box = document.getElementById('modal-box');
            const body = document.getElementById('modal-body');
            
            // Renderiza as informações em grelha
            let html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
            
            Object.keys(rowData).forEach(key => {
                let val = rowData[key] || '<span class="text-slate-400 italic">Não informado</span>';
                if (key.toUpperCase() === 'STATUS') val = formatarStatus(val);
                
                // Dar mais destaque se for uma "Observação" ou "Detalhes do Serviço" (Ocupar 2 colunas)
                const colSpan = (key.toUpperCase().includes('OBSERVA') || key.toUpperCase().includes('DETALHE')) ? 'md:col-span-2' : '';

                html += `
                    <div class="${colSpan} bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <span class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">${key}</span>
                        <div class="text-slate-800 font-medium whitespace-pre-wrap">${val}</div>
                    </div>
                `;
            });
            html += `</div>`;

            body.innerHTML = html;
            
            // Animação de entrada
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                box.classList.remove('scale-95');
            }, 10);
        }

        function fecharModal() {
            const modal = document.getElementById('modal-detalhes');
            const box = document.getElementById('modal-box');
            
            modal.classList.add('opacity-0');
            box.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Fechar modal clicando fora
        document.getElementById('modal-detalhes').addEventListener('click', function(e) {
            if (e.target === this) fecharModal();
        });

    </script>
</body>
</html>
