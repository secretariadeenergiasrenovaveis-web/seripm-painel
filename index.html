<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel SERIPM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwrR6SIiUTlaVfwkmIBLkBBPdXZyACghwOM9CzpZ0bK2YB194nHjrlaX0lvqhzxrn4e/exec"; 
    </script>

    <div id="toast" class="fixed top-5 right-5 z-50 transform transition-all duration-300 translate-y-[-100%] opacity-0 bg-white shadow-xl rounded-xl p-4 flex items-center gap-3 border-l-4">
        <div id="toast-icon"></div>
        <p id="toast-msg" class="text-sm font-bold"></p>
    </div>

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-slate-100">
            <div class="text-center mb-8">
                <i class="fa-solid fa-shield-halved text-4xl text-blue-600 mb-2"></i>
                <h1 class="text-2xl font-black text-slate-800">SERIPM</h1>
                <p class="text-xs text-slate-500 font-bold tracking-widest uppercase">Acesso Restrito</p>
            </div>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Usuário</label>
                    <input type="text" id="login-user" required class="w-full border rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-600 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Senha</label>
                    <input type="password" id="login-pass" required class="w-full border rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-600 outline-none">
                </div>
                <button type="submit" id="btn-login" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md hover:bg-blue-700 transition">Entrar</button>
            </form>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen flex flex-col">
        <header class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center print:hidden">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-layer-group text-blue-600 text-xl"></i>
                <h1 class="text-lg font-black">Central de Protocolos</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="user-name" class="text-sm font-bold text-slate-800"></p>
                    <p id="user-role" class="text-xs text-slate-500 font-bold uppercase"></p>
                </div>
                <button onclick="logout()" class="text-slate-400 hover:text-red-500 transition"><i class="fa-solid fa-right-from-bracket text-xl"></i></button>
            </div>
        </header>

        <main class="flex-1 p-6 max-w-7xl mx-auto w-full">
            <div class="flex flex-col md:flex-row justify-between gap-4 mb-6 print:hidden">
                <div class="flex gap-2 w-full md:w-1/2">
                    <input type="text" id="search-input" onkeyup="filterTable()" placeholder="Buscar bairro, rua, nome ou protocolo..." class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-600 outline-none shadow-sm">
                </div>
                <div class="flex gap-2">
                    <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-3 rounded-xl text-sm font-bold shadow-sm hover:bg-slate-700"><i class="fa-solid fa-print mr-2"></i>Imprimir</button>
                    <button onclick="openModal('modal-novo')" class="bg-blue-600 text-white px-4 py-3 rounded-xl text-sm font-bold shadow-md hover:bg-blue-700"><i class="fa-solid fa-plus mr-2"></i>Novo Protocolo</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden" id="print-area">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500 font-bold">
                                <th class="p-4">Protocolo / Data</th>
                                <th class="p-4">Cliente</th>
                                <th class="p-4">Endereço</th>
                                <th class="p-4">Serviço</th>
                                <th class="p-4 text-center">Status</th>
                                <th class="p-4 text-center print:hidden">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-novo" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 print:hidden">
        <div class="bg-white rounded-2xl max-w-lg w-full shadow-2xl overflow-hidden">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50">
                <h3 class="font-black text-slate-800 uppercase tracking-wide text-sm"><i class="fa-solid fa-file-circle-plus text-blue-600 mr-2"></i>Criar Protocolo</h3>
                <button onclick="closeModal('modal-novo')" class="text-slate-400 hover:text-slate-700"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form onsubmit="submitProtocolo(event)" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-slate-700 uppercase">Nome do Cliente</label>
                        <input type="text" id="np-cliente" required class="w-full border rounded-xl p-2 text-sm uppercase">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-700 uppercase">CPF</label>
                        <input type="text" id="np-cpf" class="w-full border rounded-xl p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-700 uppercase">Telefone</label>
                        <input type="text" id="np-telefone" class="w-full border rounded-xl p-2 text-sm">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-slate-700 uppercase">Endereço (Rua, Nº)</label>
                        <input type="text" id="np-endereco" required class="w-full border rounded-xl p-2 text-sm uppercase">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-700 uppercase">Bairro</label>
                        <input type="text" id="np-bairro" required class="w-full border rounded-xl p-2 text-sm uppercase">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-700 uppercase">Tipo de Serviço</label>
                        <input type="text" id="np-servico" class="w-full border rounded-xl p-2 text-sm uppercase">
                    </div>
                </div>
                <div class="pt-4 flex justify-end gap-3 border-t mt-4">
                    <button type="button" onclick="closeModal('modal-novo')" class="px-4 py-2 border rounded-xl text-xs font-bold">Cancelar</button>
                    <button type="submit" id="btn-save-np" class="px-4 py-2 bg-blue-600 text-white text-xs font-bold rounded-xl shadow-md">Salvar Protocolo</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentRole = null;
        let protocolsData = [];

        // 1. UTILITÁRIOS E UI
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            document.getElementById('toast-icon').innerHTML = type === 'success' ? '<i class="fa-solid fa-check text-green-500"></i>' : '<i class="fa-solid fa-xmark text-red-500"></i>';
            toast.className = `fixed top-5 right-5 z-50 transform transition-all duration-300 bg-white shadow-xl rounded-xl p-4 flex items-center gap-3 border-l-4 ${type === 'success' ? 'border-green-500' : 'border-red-500'}`;
            setTimeout(() => toast.classList.add('translate-y-[-100%]', 'opacity-0'), 3000);
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // 2. FUNÇÃO CORE DE REQUISIÇÃO (COM BYPASS DE CORS)
        async function fetchAPI(payload) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    redirect: 'follow', // OBRIGATÓRIO PARA NÃO DAR ERRO DE CORS NO APPS SCRIPT
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (error) {
                console.error(error);
                showToast("Erro de conexão com o servidor.", "error");
                return { success: false };
            }
        }

        // 3. LOGIN E SESSÃO
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.textContent = "Autenticando..."; btn.disabled = true;

            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;

            const res = await fetchAPI({ action: "login", username: user, password: pass });
            
            if (res.success) {
                currentUser = res.username; currentRole = res.role;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('user-name').textContent = currentUser;
                document.getElementById('user-role').textContent = currentRole;
                loadProtocols();
                showToast("Bem-vindo!", "success");
            } else {
                showToast(res.error, "error");
            }
            btn.textContent = "Entrar"; btn.disabled = false;
        }

        function logout() {
            currentUser = null; currentRole = null;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('login-pass').value = '';
        }

        // 4. CARREGAR E RENDERIZAR TABELA
        async function loadProtocols() {
            document.getElementById('table-body').innerHTML = `<tr><td colspan="6" class="text-center p-8 text-slate-400"><i class="fa-solid fa-spinner fa-spin text-2xl"></i> Carregando...</td></tr>`;
            const res = await fetchAPI({ action: "getProtocols", username: currentUser, role: currentRole });
            
            if (res.success) {
                protocolsData = res.data;
                renderTable(protocolsData);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center p-8 font-bold text-slate-400">Nenhum protocolo encontrado.</td></tr>`;
                return;
            }

            data.forEach(p => {
                let badgeColor = "bg-slate-100 text-slate-600";
                if (p.status === "ABERTO") badgeColor = "bg-amber-100 text-amber-700";
                if (p.status === "GARANTIA") badgeColor = "bg-rose-100 text-rose-700";
                if (p.status === "RESOLVIDO" || p.status === "CONCLUÍDO") badgeColor = "bg-emerald-100 text-emerald-700";

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4">
                            <p class="font-black text-slate-800">${p.protocolo}</p>
                            <p class="text-[10px] text-slate-500 font-bold">${p.data}</p>
                        </td>
                        <td class="p-4 font-bold text-slate-700">${p.cliente}<br><span class="text-[10px] text-slate-400 font-normal"><i class="fa-solid fa-phone mr-1"></i>${p.telefone || 'N/A'}</span></td>
                        <td class="p-4 text-xs font-bold text-slate-600">${p.endereco}<br><span class="text-slate-400">${p.bairro}</span></td>
                        <td class="p-4 text-xs font-bold text-slate-600">${p.servico}</td>
                        <td class="p-4 text-center"><span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ${badgeColor}">${p.status}</span></td>
                        <td class="p-4 text-center print:hidden">
                            <select onchange="changeStatus('${p.protocolo}', this.value)" class="text-xs border rounded-lg p-1 bg-white font-bold text-slate-600 cursor-pointer outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="" disabled selected>Alterar...</option>
                                <option value="ABERTO">Aberto</option>
                                <option value="GARANTIA">Garantia</option>
                                <option value="TELECOM">Telecom</option>
                                <option value="RESOLVIDO">Resolvido</option>
                            </select>
                        </td>
                    </tr>
                `;
            });
        }

        // 5. FILTRAGEM LOCAL (Rápida, sem ir ao servidor)
        function filterTable() {
            const termo = document.getElementById('search-input').value.toLowerCase();
            const filtrados = protocolsData.filter(p => 
                p.protocolo.toLowerCase().includes(termo) ||
                p.cliente.toLowerCase().includes(termo) ||
                p.bairro.toLowerCase().includes(termo) ||
                p.endereco.toLowerCase().includes(termo)
            );
            renderTable(filtrados);
        }

        // 6. CRIAR NOVO PROTOCOLO
        async function submitProtocolo(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save-np');
            btn.textContent = "Salvando..."; btn.disabled = true;

            const payload = {
                action: "createProtocol",
                username: currentUser,
                data: {
                    cliente: document.getElementById('np-cliente').value,
                    cpf: document.getElementById('np-cpf').value,
                    telefone: document.getElementById('np-telefone').value,
                    endereco: document.getElementById('np-endereco').value,
                    bairro: document.getElementById('np-bairro').value,
                    servico: document.getElementById('np-servico').value
                }
            };

            const res = await fetchAPI(payload);
            if (res.success) {
                showToast("Protocolo " + res.protocolo + " criado!", "success");
                closeModal('modal-novo');
                document.querySelector('#modal-novo form').reset();
                loadProtocols(); // Recarrega a tabela para exibir o novo
            } else {
                showToast("Erro ao salvar.", "error");
            }
            btn.textContent = "Salvar Protocolo"; btn.disabled = false;
        }

        // 7. ALTERAR STATUS DO PROTOCOLO
        async function changeStatus(protocolId, newStatus) {
            if(!confirm(`Deseja alterar o protocolo ${protocolId} para ${newStatus}?`)) return loadProtocols();
            
            showToast("Atualizando...", "success");
            const res = await fetchAPI({ action: "updateStatus", username: currentUser, protocolId: protocolId, newStatus: newStatus });
            
            if (res.success) {
                showToast("Status atualizado com sucesso!", "success");
                loadProtocols(); // Recarrega os dados atualizados
            } else {
                showToast("Erro ao atualizar.", "error");
            }
        }
    </script>
</body>
</html>
