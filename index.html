<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo SERIPM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased">

    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-xl w-96 border border-slate-200">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">SERIPM 2026</h2>
            <input type="text" id="user" placeholder="Usuário" class="w-full p-3 mb-4 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" id="pass" placeholder="Senha" class="w-full p-3 mb-6 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="fazerLogin()" class="w-full bg-blue-800 text-white p-3 rounded-lg font-bold hover:bg-blue-900 transition">ENTRAR</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-screen">
        <aside class="w-64 bg-slate-900 text-white p-6 flex flex-col h-full">
            <h1 class="text-xl font-bold mb-8 border-b border-slate-700 pb-4">SERIPM 2026</h1>
            <nav class="space-y-2 flex-1 overflow-y-auto no-scrollbar">
                <button onclick="trocarAba('ENTRADA')" class="block w-full text-left p-2 hover:bg-blue-800 rounded transition">Entrada</button>
                <button onclick="trocarAba('ADMINISTRATIVO')" class="block w-full text-left p-2 hover:bg-blue-800 rounded transition">Administrativo</button>
                <button onclick="trocarAba('SUPERVISOR')" class="block w-full text-left p-2 hover:bg-blue-800 rounded transition">Supervisor</button>
                <button onclick="trocarAba('COM FUNCIONÁRIO')" class="block w-full text-left p-2 hover:bg-blue-800 rounded transition">Com Funcionário</button>
                <button onclick="trocarAba('IMPLANTAÇÃO')" class="block w-full text-left p-2 hover:bg-blue-800 rounded transition">Implantação</button>
                <button onclick="trocarAba('OBRA')" class="block w-full text-left p-2 hover:bg-blue-800 rounded transition">Obra</button>
                <button onclick="trocarAba('GARANTIA')" class="block w-full text-left p-2 hover:bg-blue-800 rounded transition">Garantia</button>
            </nav>
            <button onclick="logout()" class="text-red-400 hover:text-red-300 mt-auto pt-4 border-t border-slate-700"><i class="fas fa-sign-out-alt mr-2"></i> Sair</button>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <h2 id="tab-title" class="text-2xl font-bold text-slate-800">Selecione uma aba</h2>
                <span id="display-user" class="bg-white px-4 py-2 rounded-lg shadow-sm font-medium"></span>
            </header>
            <div id="content-area" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] overflow-x-auto">
                <p>Selecione um setor no menu lateral para visualizar os dados.</p>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxNb43bJzS-d5Fz7mtHft3U40Ts86y6POoCPVtMXqKwShOQUXbxBMowjQrFj6jy8BrS/exec";

        window.onload = () => {
            const savedUser = localStorage.getItem('seripm_user');
            if (savedUser) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('display-user').innerText = "Usuário: " + savedUser;
            }
        };

        async function fazerLogin() {
            const u = document.getElementById('user').value;
            localStorage.setItem('seripm_user', u);
            localStorage.setItem('seripm_role', "SUPERVISOR"); 
            location.reload();
        }

        async function trocarAba(aba) {
            document.getElementById('tab-title').innerText = aba;
            const content = document.getElementById('content-area');
            content.innerHTML = `<p class="text-slate-500">A processar dados de ${aba}...</p>`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Tenta contornar bloqueios iniciais
                    body: JSON.stringify({ 
                        action: "getProtocols", 
                        tab: aba, 
                        role: "SUPERVISOR"
                    })
                });
                
                // Nota: como usamos no-cors, não conseguimos ler o JSON diretamente.
                // Recomendo alterar para o modo padrão se o seu GAS permitir CORS.
                const result = await (await fetch(API_URL, {method: 'POST', body: JSON.stringify({action: "getProtocols", tab: aba})})).json();

                if (result.success) {
                    renderizarTabela(result.data, content);
                } else {
                    content.innerHTML = `<p class="text-red-500">Erro: ${result.error || "Dados indisponíveis."}</p>`;
                }
            } catch (e) {
                console.error("Erro na API:", e);
                content.innerHTML = `<p class="text-red-500">Erro de conexão. Verifique se a API está implantada.</p>`;
            }
        }

        function renderizarTabela(dados, container) {
            if (!dados || dados.length === 0) { container.innerHTML = "<p>Nenhum registo encontrado.</p>"; return; }
            
            let html = `<table class="w-full text-xs text-left border-collapse"><thead class="bg-slate-800 text-white"><tr>`;
            Object.keys(dados[0]).forEach(k => html += `<th class="px-2 py-2 border">${k}</th>`);
            html += `</tr></thead><tbody>`;
            dados.forEach(row => {
                html += `<tr class="border-b hover:bg-slate-50">`;
                Object.values(row).forEach(v => html += `<td class="px-2 py-2 border">${v || '-'}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
