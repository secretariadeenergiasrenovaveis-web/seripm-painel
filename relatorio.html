<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Gerencial - SERIPM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Regras estritas para impressão e PDF */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; font-size: 10pt; }
            #pdf-container { padding: 0 !important; max-width: 100% !important; }
            .print-hidden-row { display: none !important; } /* Esconde linhas não selecionadas */
            .chart-container { page-break-inside: avoid; }
        }
        /* Classe usada pelo JS para esconder linhas não selecionadas na hora de gerar PDF/Imprimir */
        .hide-for-export { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased p-4 md:p-8">

    <div class="max-w-[1400px] mx-auto space-y-6" id="pdf-container">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tight uppercase flex items-center gap-3">
                    <i class="fa-solid fa-chart-line text-blue-600"></i> Relatório Estatístico e Operacional
                </h1>
                <p class="text-xs font-bold text-slate-500 uppercase mt-1 tracking-wider">
                    Base Analisada: <span id="lbl-aba" class="text-blue-600 font-black">CARREGANDO...</span> | Emissão: <span id="lbl-data"></span>
                </p>
            </div>
            
            <div class="no-print flex flex-wrap gap-2">
                <button onclick="executarImpressao('todos')" class="bg-slate-100 text-slate-700 px-3 py-2 rounded-xl text-xs font-bold hover:bg-slate-200 border border-slate-300 transition">
                    <i class="fa-solid fa-print mr-1"></i> Imprimir Tudo
                </button>
                <button onclick="executarImpressao('selecionados')" class="bg-slate-800 text-white px-3 py-2 rounded-xl text-xs font-bold hover:bg-slate-700 transition shadow-sm">
                    <i class="fa-solid fa-print mr-1"></i> Imprimir Seleção (<span class="sel-count">0</span>)
                </button>
                <button onclick="gerarPDF('todos')" class="bg-rose-50 text-rose-700 border border-rose-200 px-3 py-2 rounded-xl text-xs font-bold hover:bg-rose-100 transition">
                    <i class="fa-solid fa-file-pdf mr-1"></i> PDF Geral
                </button>
                <button onclick="gerarPDF('selecionados')" class="bg-rose-600 text-white px-3 py-2 rounded-xl text-xs font-bold hover:bg-rose-700 transition shadow-sm">
                    <i class="fa-solid fa-file-pdf mr-1"></i> PDF Seleção (<span class="sel-count">0</span>)
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-[10px] uppercase font-black text-slate-400 tracking-wider">Volume Total</p>
                <p id="card-total" class="text-3xl font-black text-blue-600 mt-1">0</p>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 border-b-4 border-b-amber-400">
                <p class="text-[10px] uppercase font-black text-slate-400 tracking-wider">Abertos</p>
                <p id="card-abertos" class="text-3xl font-black text-slate-800 mt-1">0</p>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 border-b-4 border-b-rose-400">
                <p class="text-[10px] uppercase font-black text-slate-400 tracking-wider">Em Garantia</p>
                <p id="card-garantia" class="text-3xl font-black text-slate-800 mt-1">0</p>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 border-b-4 border-b-emerald-400">
                <p class="text-[10px] uppercase font-black text-slate-400 tracking-wider">Resolvidos</p>
                <p id="card-resolvidos" class="text-3xl font-black text-slate-800 mt-1">0</p>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 border-b-4 border-b-slate-400">
                <p class="text-[10px] uppercase font-black text-slate-400 tracking-wider">Outros / Telecom</p>
                <p id="card-outros" class="text-3xl font-black text-slate-800 mt-1">0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 chart-container">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 md:col-span-1">
                <h3 class="text-xs font-black uppercase text-slate-500 mb-4 tracking-wider">Distribuição por Status</h3>
                <div class="relative h-64 w-full">
                    <canvas id="chartStatus"></canvas>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 md:col-span-2">
                <h3 class="text-xs font-black uppercase text-slate-500 mb-4 tracking-wider">Top 10 Bairros com Mais Chamados</h3>
                <div class="relative h-64 w-full">
                    <canvas id="chartBairros"></canvas>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 no-print">
            <div class="relative">
                <i class="fa-solid fa-filter absolute left-4 top-3 text-slate-400 text-sm"></i>
                <input type="text" id="filtro-tabela" onkeyup="filtrarRelatorio()" placeholder="Filtrar dados por Protocolo, Bairro, Solicitante ou Status..." class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse">
                    <thead>
                        <tr class="bg-slate-100 border-b border-slate-200 text-[10px] font-black uppercase text-slate-500 tracking-wider">
                            <th class="p-3 w-10 text-center no-print">
                                <input type="checkbox" id="chk-all" onchange="toggleAll(this)" class="rounded border-slate-300">
                            </th>
                            <th class="p-3">Protocolo / Data</th>
                            <th class="p-3">Solicitante</th>
                            <th class="p-3">Bairro / Endereço</th>
                            <th class="p-3">Serviço / Solicitação</th>
                            <th class="p-3 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="relatorio-body" class="divide-y divide-slate-100 font-medium text-slate-700">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        let reportData = [];
        let filteredData = [];
        let selectedRows = new Set();
        let chartStatusInstance = null;
        let chartBairrosInstance = null;

        // INICIALIZAÇÃO
        window.onload = () => {
            const rawData = sessionStorage.getItem('seripm_report_data');
            const abaName = sessionStorage.getItem('seripm_report_tab');

            if (!rawData) {
                alert("Nenhum dado encontrado. Por favor, gere o relatório a partir da plataforma principal.");
                window.close();
                return;
            }

            reportData = JSON.parse(rawData);
            filteredData = [...reportData];
            
            document.getElementById('lbl-aba').textContent = abaName || "GERAL";
            document.getElementById('lbl-data').textContent = new Date().toLocaleString('pt-BR');

            atualizarEstatisticas();
            renderizarTabela();
        };

        // FORMATAÇÃO DE DATA BRASILEIRA
        function formatarDataHora(stringData) {
            if (!stringData) return "-";
            try {
                let d = new Date(stringData);
                if (isNaN(d.getTime())) return stringData.toString().split(".")[0];
                const dia = String(d.getDate()).padStart(2, '0');
                const mes = String(d.getMonth() + 1).padStart(2, '0');
                const ano = d.getFullYear();
                const hora = String(d.getHours()).padStart(2, '0');
                const min = String(d.getMinutes()).padStart(2, '0');
                return `${dia}/${mes}/${ano} - ${hora}:${min}`;
            } catch (e) { return stringData; }
        }

        // CÁLCULO E RENDERIZAÇÃO DE ESTATÍSTICAS E GRÁFICOS
        function atualizarEstatisticas() {
            let abertos = 0, garantia = 0, resolvidos = 0, outros = 0;
            let statusCount = {};
            let bairroCount = {};

            filteredData.forEach(p => {
                const st = (p.status || "ABERTO").toUpperCase();
                
                // Contadores Cards
                if (st === "ABERTO") abertos++;
                else if (st === "GARANTIA") garantia++;
                else if (st === "RESOLVIDO" || st === "CONCLUÍDO") resolvidos++;
                else outros++;

                // Agrupadores Gráficos
                statusCount[st] = (statusCount[st] || 0) + 1;
                
                if (p.bairro) {
                    const b = p.bairro.toUpperCase().trim();
                    bairroCount[b] = (bairroCount[b] || 0) + 1;
                }
            });

            // Atualiza Cards
            document.getElementById('card-total').textContent = filteredData.length;
            document.getElementById('card-abertos').textContent = abertos;
            document.getElementById('card-garantia').textContent = garantia;
            document.getElementById('card-resolvidos').textContent = resolvidos;
            document.getElementById('card-outros').textContent = outros;

            // Renderiza Gráficos
            desenharGraficoStatus(statusCount);
            desenharGraficoBairros(bairroCount);
        }

        function desenharGraficoStatus(dataMap) {
            const ctx = document.getElementById('chartStatus').getContext('2d');
            if (chartStatusInstance) chartStatusInstance.destroy();

            chartStatusInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(dataMap),
                    datasets: [{
                        data: Object.values(dataMap),
                        backgroundColor: ['#fbbf24', '#f43f5e', '#34d399', '#60a5fa', '#94a3b8', '#a78bfa'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } } }
            });
        }

        function desenharGraficoBairros(dataMap) {
            const ctx = document.getElementById('chartBairros').getContext('2d');
            if (chartBairrosInstance) chartBairrosInstance.destroy();

            // Ordena e pega os top 10 bairros
            const sorted = Object.entries(dataMap).sort((a, b) => b[1] - a[1]).slice(0, 10);
            
            chartBairrosInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(item => item[0]),
                    datasets: [{
                        label: 'Volume de Chamados',
                        data: sorted.map(item => item[1]),
                        backgroundColor: '#3b82f6',
                        borderRadius: 4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } }, x: { ticks: { font: { size: 9 } } } } }
            });
        }

        // TABELA E SELEÇÃO
        function renderizarTabela() {
            const tbody = document.getElementById('relatorio-body');
            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center p-8 text-slate-400 font-bold uppercase">Nenhum registro corresponde ao filtro.</td></tr>`;
                return;
            }

            let html = "";
            filteredData.forEach(p => {
                let badge = "bg-slate-100 text-slate-600 border-slate-300";
                const st = (p.status || "").toUpperCase();
                if (st === "ABERTO") badge = "bg-amber-100 text-amber-800 border-amber-300";
                if (st === "GARANTIA") badge = "bg-rose-100 text-rose-800 border-rose-300";
                if (st === "RESOLVIDO" || st === "CONCLUÍDO") badge = "bg-emerald-100 text-emerald-800 border-emerald-300";

                const isChecked = selectedRows.has(p.protocolo) ? "checked" : "";

                html += `
                    <tr class="hover:bg-slate-50 border-b border-slate-100 row-item" data-id="${p.protocolo}">
                        <td class="p-3 text-center no-print">
                            <input type="checkbox" class="chk-row rounded border-slate-300" onchange="toggleRow('${p.protocolo}', this.checked)" ${isChecked}>
                        </td>
                        <td class="p-3">
                            <p class="font-black text-slate-900 tracking-wide">${p.protocolo}</p>
                            <p class="text-[10px] text-slate-500 font-bold mt-0.5">${formatarDataHora(p.dataHora)}</p>
                        </td>
                        <td class="p-3 font-black text-slate-700 uppercase">${p.solicitante}<br><span class="text-[9px] font-bold text-slate-400"><i class="fa-solid fa-phone mr-1"></i>${p.telefone || '-'}</span></td>
                        <td class="p-3 text-xs uppercase text-slate-700"><b>${p.bairro}</b><br><span class="text-[10px] text-slate-500">${p.endereco}</span></td>
                        <td class="p-3 text-xs uppercase text-slate-700"><b>${p.solicitacao}</b><br><span class="text-[10px] text-slate-500">${p.detalhes || '-'}</span></td>
                        <td class="p-3 text-center">
                            <span class="px-2.5 py-1 rounded-lg text-[9px] font-black uppercase border tracking-wider ${badge}">${st}</span>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function filtrarRelatorio() {
            const val = document.getElementById('filtro-tabela').value.toLowerCase();
            filteredData = reportData.filter(p => 
                (p.protocolo||'').toLowerCase().includes(val) || 
                (p.solicitante||'').toLowerCase().includes(val) ||
                (p.bairro||'').toLowerCase().includes(val) || 
                (p.status||'').toLowerCase().includes(val)
            );
            atualizarEstatisticas();
            renderizarTabela();
        }

        function toggleRow(id, isChecked) {
            if (isChecked) selectedRows.add(id);
            else selectedRows.delete(id);
            atualizarContadoresSelecao();
        }

        function toggleAll(chk) {
            document.querySelectorAll('.chk-row').forEach(el => {
                el.checked = chk.checked;
                const id = el.closest('tr').getAttribute('data-id');
                if (chk.checked) selectedRows.add(id);
                else selectedRows.delete(id);
            });
            atualizarContadoresSelecao();
        }

        function atualizarContadoresSelecao() {
            document.querySelectorAll('.sel-count').forEach(el => el.textContent = selectedRows.size);
        }

        // LÓGICA DE EXPORTAÇÃO (IMPRESSÃO E PDF)
        function prepararLayoutParaExportacao(modo) {
            // Se o modo for 'selecionados', esconde as linhas da tabela que não estão selecionadas
            if (modo === 'selecionados' && selectedRows.size > 0) {
                document.querySelectorAll('.row-item').forEach(tr => {
                    if (!selectedRows.has(tr.getAttribute('data-id'))) {
                        tr.classList.add('hide-for-export');
                    }
                });
            } else if (modo === 'selecionados' && selectedRows.size === 0) {
                alert("Nenhum protocolo selecionado para exportação.");
                return false;
            }
            return true;
        }

        function restaurarLayoutAposExportacao() {
            document.querySelectorAll('.row-item').forEach(tr => tr.classList.remove('hide-for-export'));
        }

        function executarImpressao(modo) {
            if (!prepararLayoutParaExportacao(modo)) return;
            window.print();
            restaurarLayoutAposExportacao();
        }

        function gerarPDF(modo) {
            if (!prepararLayoutParaExportacao(modo)) return;
            
            const elemento = document.getElementById('pdf-container');
            
            // Configurações do HTML2PDF
            const opt = {
                margin:       [10, 10, 10, 10], // Margens
                filename:     `Relatorio_SERIPM_${document.getElementById('lbl-aba').textContent}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            // Gera o PDF
            html2pdf().set(opt).from(elemento).save().then(() => {
                restaurarLayoutAposExportacao();
            });
        }
    </script>
</body>
</html>
