<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Execução - SERIPM 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <style>
        * { font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; }
        .protocol-card { transition: all 0.3s ease; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .protocol-card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-overlay { backdrop-filter: blur(4px); }
        .btn-status { transition: all 0.2s ease; }
        .btn-status:hover { transform: scale(1.05); }
    </style>
</head>
<body class="text-gray-100">

    <!-- HEADER -->
    <header class="bg-gradient-to-r from-slate-900 to-slate-800 border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="https://secretariadenergiasrenovaveis-web.github.io/seripm-painel/images/perfilx.png" alt="Brasão" class="h-10 w-10 object-contain">
                <div>
                    <h1 class="text-xl font-bold text-white">Portal de Execução</h1>
                    <p class="text-xs text-slate-400">SERIPM 2026</p>
                </div>
            </div>
            <button id="logoutBtn" onclick="fazerLogout()" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700 transition text-white text-sm font-semibold hidden">
                <i class="fas fa-sign-out-alt"></i> Sair
            </button>
        </div>
    </header>

    <!-- LOGIN SCREEN -->
    <div id="telaLogin" class="fixed inset-0 bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center z-50 p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl max-w-md w-full p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 overflow-hidden">
                    <img src="https://secretariadenergiasrenovaveis-web.github.io/seripm-painel/images/perfilx.png" alt="Perfil" class="w-full h-full object-cover">
                </div>
                <h2 class="text-3xl font-bold text-white">Portal Empresa</h2>
                <p class="text-slate-400 mt-2">SERIPM 2026</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Usuário</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-3 text-slate-500"></i>
                        <input type="text" id="user" class="w-full pl-10 pr-4 py-2 rounded-lg bg-slate-900 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-orange-500 transition" placeholder="Seu usuário">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Senha</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-3 text-slate-500"></i>
                        <input type="password" id="pass" class="w-full pl-10 pr-4 py-2 rounded-lg bg-slate-900 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-orange-500 transition" placeholder="••••••••">
                    </div>
                </div>
                <button onclick="fazerLogin()" id="btnLogin" class="w-full px-4 py-3 rounded-lg bg-orange-600 hover:bg-orange-700 transition text-white font-semibold flex items-center justify-center gap-2">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main id="dashboard" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- FILTROS -->
        <div class="mb-8 flex flex-col sm:flex-row gap-4 items-stretch sm:items-center flex-wrap">
            <div class="flex-1 min-w-[200px]">
                <input type="text" id="filtroProtocolo" placeholder="🔍 Filtrar por protocolo..." class="w-full px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-orange-500 transition">
            </div>
            <div class="flex-1 min-w-[200px]">
                <select id="filtroBairro" class="w-full px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white focus:outline-none focus:border-orange-500 transition">
                    <option value="">📍 Todos os bairros</option>
                </select>
            </div>
            <button onclick="carregarProtocolos()" class="px-6 py-2 rounded-lg bg-orange-600 hover:bg-orange-700 transition text-white font-semibold flex items-center justify-center gap-2">
                <i class="fas fa-redo"></i> Atualizar
            </button>
        </div>

        <!-- STATUS MESSAGE -->
        <div id="mensagem" class="mb-6 p-4 rounded-lg bg-slate-800 border border-slate-700 text-slate-400 text-center hidden">
            <i class="fas fa-info-circle mr-2"></i> <span id="textoMensagem"></span>
        </div>

        <!-- PROTOCOLS GRID -->
        <div id="protocolosContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards gerados dinamicamente -->
        </div>
    </main>

    <!-- MODAL DETALHES -->
    <div id="modalDetalhes" class="fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <!-- Header Modal -->
            <div class="sticky top-0 bg-gradient-to-r from-slate-900 to-slate-800 border-b border-slate-700 px-6 py-4 flex items-center justify-between">
                <h2 class="text-2xl font-bold text-white">Detalhes do Protocolo</h2>
                <button onclick="fecharModal()" class="text-slate-400 hover:text-white transition">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <!-- Content Modal -->
            <div class="p-6 space-y-6">
                <!-- Informações básicas -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <p class="text-slate-500 text-sm font-semibold uppercase tracking-wider mb-1">Protocolo</p>
                        <p id="modal_protocolo" class="text-lg font-bold text-orange-400"></p>
                    </div>
                    <div>
                        <p class="text-slate-500 text-sm font-semibold uppercase tracking-wider mb-1">Status</p>
                        <p id="modal_status" class="text-lg font-bold text-green-400"></p>
                    </div>
                    <div>
                        <p class="text-slate-500 text-sm font-semibold uppercase tracking-wider mb-1">Data</p>
                        <p id="modal_data" class="text-lg font-bold text-slate-300"></p>
                    </div>
                    <div>
                        <p class="text-slate-500 text-sm font-semibold uppercase tracking-wider mb-1">Solicitante</p>
                        <p id="modal_solicitante" class="text-lg font-bold text-slate-300"></p>
                    </div>
                </div>

                <div class="border-t border-slate-700 pt-6">
                    <p class="text-slate-500 text-sm font-semibold uppercase tracking-wider mb-3">Localização</p>
                    <div class="bg-slate-900 rounded-lg p-4 space-y-3">
                        <div>
                            <p class="text-slate-500 text-sm">Endereço</p>
                            <p id="modal_endereco" class="text-white font-semibold"></p>
                        </div>
                        <div>
                            <p class="text-slate-500 text-sm">Bairro</p>
                            <p id="modal_bairro" class="text-white font-semibold"></p>
                        </div>
                        <div>
                            <p class="text-slate-500 text-sm">Referência</p>
                            <p id="modal_referencia" class="text-white font-semibold"></p>
                        </div>
                    </div>
                </div>

                <div class="border-t border-slate-700 pt-6">
                    <p class="text-slate-500 text-sm font-semibold uppercase tracking-wider mb-3">Contato</p>
                    <div class="bg-slate-900 rounded-lg p-4 space-y-3">
                        <div>
                            <p class="text-slate-500 text-sm">Telefone</p>
                            <a id="modal_telefone_link" href="#" class="text-orange-400 hover:text-orange-300 font-semibold"></a>
                        </div>
                        <div>
                            <p class="text-slate-500 text-sm">CPF</p>
                            <p id="modal_cpf" class="text-white font-semibold"></p>
                        </div>
                    </div>
                </div>

                <div class="border-t border-slate-700 pt-6">
                    <p class="text-slate-500 text-sm font-semibold uppercase tracking-wider mb-3">Serviço</p>
                    <div class="bg-slate-900 rounded-lg p-4 space-y-3">
                        <div>
                            <p class="text-slate-500 text-sm">Tipo</p>
                            <p id="modal_tipo_servico" class="text-white font-semibold"></p>
                        </div>
                        <div>
                            <p class="text-slate-500 text-sm">Detalhes</p>
                            <p id="modal_detalhes" class="text-white font-semibold bg-slate-800 rounded p-3 max-h-24 overflow-y-auto"></p>
                        </div>
                        <div>
                            <p class="text-slate-500 text-sm">Observações</p>
                            <p id="modal_observacoes" class="text-white font-semibold bg-slate-800 rounded p-3 max-h-24 overflow-y-auto"></p>
                        </div>
                    </div>
                </div>

                <!-- Mudança de Status -->
                <div class="border-t border-slate-700 pt-6">
                    <p class="text-slate-500 text-sm font-semibold uppercase tracking-wider mb-4">Alterar Status</p>
                    <div class="space-y-3">
                        <!-- Resolvido -->
                        <button onclick="mudarStatus('RESOLVIDO')" class="w-full px-4 py-3 rounded-lg bg-green-600 hover:bg-green-700 transition text-white font-semibold flex items-center justify-center gap-2 btn-status">
                            <i class="fas fa-check-circle"></i> Marcar como Resolvido
                        </button>

                        <!-- Devolver -->
                        <button onclick="abrirMotivoDevolucao()" class="w-full px-4 py-3 rounded-lg bg-blue-600 hover:bg-blue-700 transition text-white font-semibold flex items-center justify-center gap-2 btn-status">
                            <i class="fas fa-arrow-left"></i> Devolver (com motivo)
                        </button>

                        <!-- Cancelar -->
                        <button onclick="abrirMotivoCancelamento()" class="w-full px-4 py-3 rounded-lg bg-red-600 hover:bg-red-700 transition text-white font-semibold flex items-center justify-center gap-2 btn-status">
                            <i class="fas fa-ban"></i> Cancelar (com motivo)
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL MOTIVO DEVOLUÇÃO -->
    <div id="modalMotivoDevolucao" class="fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl max-w-md w-full">
            <div class="bg-gradient-to-r from-slate-900 to-slate-800 border-b border-slate-700 px-6 py-4">
                <h3 class="text-xl font-bold text-white">Motivo da Devolução</h3>
            </div>
            <div class="p-6 space-y-4">
                <textarea id="motivoDevolucao" placeholder="Descreva o motivo da devolução..." class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 resize-none h-32"></textarea>
                <div class="flex gap-3">
                    <button onclick="fecharMotivoDevolucao()" class="flex-1 px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition text-white font-semibold">
                        Cancelar
                    </button>
                    <button onclick="mudarStatus('DEVOLVIDO')" class="flex-1 px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 transition text-white font-semibold">
                        Confirmar Devolução
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL MOTIVO CANCELAMENTO -->
    <div id="modalMotivoCancelamento" class="fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl max-w-md w-full">
            <div class="bg-gradient-to-r from-slate-900 to-slate-800 border-b border-slate-700 px-6 py-4">
                <h3 class="text-xl font-bold text-white">Motivo do Cancelamento</h3>
            </div>
            <div class="p-6 space-y-4">
                <textarea id="motivoCancelamento" placeholder="Descreva o motivo do cancelamento..." class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-red-500 resize-none h-32"></textarea>
                <div class="flex gap-3">
                    <button onclick="fecharMotivoCancelamento()" class="flex-1 px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition text-white font-semibold">
                        Cancelar
                    </button>
                    <button onclick="mudarStatus('CANCELADO')" class="flex-1 px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700 transition text-white font-semibold">
                        Confirmar Cancelamento
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIG API - Usar a URL correta do Apps Script publicado
        const API_URL = "https://script.google.com/macros/s/AKfycbwxfrN3AmulqSm2UvwZq45gbrFwTGM5qnufmov1OV_HtjBwg0UTjL_Xc3PwBA-u6-BZ/exec";
        let usuarioAtual = null;
        let protocoloAtual = null;
        let todosBairros = [];

        // INICIALIZAÇÃO
        window.addEventListener('load', () => {
            const user = localStorage.getItem('user');
            const role = localStorage.getItem('role');
            
            if (!user || role !== 'EMPRESA') {
                ocultarDashboard();
                return;
            }
            
            usuarioAtual = user;
            mostrarDashboard();
            carregarDadosDinamicos();
            carregarProtocolos();
            
            // Auto-atualizar a cada 30 segundos
            setInterval(carregarProtocolos, 30000);
        });

        // FAZER LOGIN
        async function fazerLogin() {
            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const btn = document.getElementById('btnLogin');
            
            if (!user || !pass) {
                alert('Por favor, preencha usuário e senha.');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Validando...';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login',
                        username: user,
                        password: pass
                    })
                });
                
                const result = await response.json();
                console.log('🔐 Resultado do login:', result);
                
                if (result.success && result.role === 'EMPRESA') {
                    localStorage.setItem('user', result.username);
                    localStorage.setItem('role', result.role);
                    localStorage.setItem('allowedTabs', result.allowedTabs || '');
                    usuarioAtual = result.username;
                    console.log('✅ Login bem-sucedido. Abas permitidas:', result.allowedTabs);
                    mostrarDashboard();
                    carregarDadosDinamicos();
                    carregarProtocolos();
                } else {
                    alert('Erro: Acesso apenas para usuários EMPRESA. Resposta: ' + JSON.stringify(result));
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                }
            } catch (err) {
                console.error('Erro completo:', err);
                alert(`Erro ao conectar com o servidor:\n${err.message}`);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
            }
        }

        // MOSTRAR/OCULTAR DASHBOARD
        function mostrarDashboard() {
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
        }

        function ocultarDashboard() {
            document.getElementById('telaLogin').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
        }

        // CARREGAR DADOS DINÂMICOS
        async function carregarDadosDinamicos() {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'getDynamicData',
                        role: localStorage.getItem('role'),
                        username: usuarioAtual
                    })
                });
                
                const result = await response.json();
                if (result.success) {
                    todosBairros = result.bairros || [];
                    preencherSelectBairro();
                }
            } catch (err) {
                console.error('Erro ao carregar dados dinâmicos:', err);
            }
        }

        // PREENCHER SELECT BAIRRO
        function preencherSelectBairro() {
            const select = document.getElementById('filtroBairro');
            select.innerHTML = '<option value="">📍 Todos os bairros</option>';
            todosBairros.forEach(bairro => {
                const option = document.createElement('option');
                option.value = bairro;
                option.textContent = bairro;
                select.appendChild(option);
            });
        }

        // CARREGAR PROTOCOLOS
        async function carregarProtocolos() {
            try {
                const payload = {
                    action: 'getProtocols',
                    tab: 'COM FUNCIONÁRIO',
                    role: localStorage.getItem('role'),
                    username: usuarioAtual,
                    allowedTabs: localStorage.getItem('allowedTabs') || ''
                };
                
                console.log('📤 Enviando para API:', payload);
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                console.log('📥 Resposta da API:', result);
                
                if (result.success && result.data && result.data.length > 0) {
                    exibirProtocolos(result.data);
                } else {
                    const msgErro = result.error || 'Nenhum protocolo disponível no momento.';
                    console.warn('⚠️ Aviso:', msgErro);
                    exibirMensagem(msgErro);
                    document.getElementById('protocolosContainer').innerHTML = '';
                }
            } catch (err) {
                console.error('❌ Erro ao carregar protocolos:', err);
                exibirMensagem('Erro ao conectar com o servidor: ' + err.message);
            }
        }

        // EXIBIR PROTOCOLOS
        function exibirProtocolos(protocolos) {
            const container = document.getElementById('protocolosContainer');
            const filtroProtocolo = document.getElementById('filtroProtocolo').value.toLowerCase();
            const filtroBairro = document.getElementById('filtroBairro').value;

            // Filtrar protocolos
            const protocolosFiltrados = protocolos.filter(p => {
                const protocolo = (p.PROTOCOLO || '').toLowerCase();
                const bairro = (p.BAIRRO || '');
                
                const passaFiltroProtocolo = !filtroProtocolo || protocolo.includes(filtroProtocolo);
                const passaFiltroBairro = !filtroBairro || bairro === filtroBairro;
                
                return passaFiltroProtocolo && passaFiltroBairro;
            });

            if (protocolosFiltrados.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-slate-400 py-12"><i class="fas fa-inbox text-4xl mb-3"></i><p>Nenhum protocolo encontrado</p></div>';
                return;
            }

            container.innerHTML = protocolosFiltrados.map(p => `
                <div class="protocol-card bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
                    <!-- Card Compacto -->
                    <div class="p-6 space-y-4">
                        <!-- Protocolo -->
                        <div class="flex items-start justify-between gap-2">
                            <div class="flex-1">
                                <p class="text-slate-500 text-xs uppercase font-semibold tracking-wider">Protocolo</p>
                                <p class="text-xl font-bold text-orange-400">${p.PROTOCOLO}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full bg-slate-700 text-slate-300 text-xs font-semibold">
                                ${p.STATUS || 'ABERTO'}
                            </span>
                        </div>

                        <!-- Endereço -->
                        <div class="bg-slate-900 rounded-lg p-3">
                            <p class="text-slate-500 text-xs uppercase font-semibold tracking-wider mb-1">📍 Endereço</p>
                            <p class="text-white font-semibold text-sm line-clamp-2">${p.ENDERECO || 'N/A'}</p>
                        </div>

                        <!-- Telefone -->
                        <div class="bg-slate-900 rounded-lg p-3">
                            <p class="text-slate-500 text-xs uppercase font-semibold tracking-wider mb-1">📞 Telefone</p>
                            <a href="tel:${(p.TELEFONE || '').replace(/\D/g, '')}" class="text-orange-400 hover:text-orange-300 font-semibold text-sm">
                                ${p.TELEFONE || 'N/A'}
                            </a>
                        </div>

                        <!-- Solicitante -->
                        <div class="bg-slate-900 rounded-lg p-3">
                            <p class="text-slate-500 text-xs uppercase font-semibold tracking-wider mb-1">👤 Solicitante</p>
                            <p class="text-white font-semibold text-sm">${p.SOLICITANTE || 'N/A'}</p>
                        </div>

                        <!-- Botão Detalhes -->
                        <button onclick='abrirDetalhes(${JSON.stringify(p).replace(/'/g, "&apos;")})' class="w-full px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition text-white text-sm font-semibold flex items-center justify-center gap-2">
                            <i class="fas fa-eye"></i> Ver Detalhes
                        </button>
                    </div>
                </div>
            `).join('');

            ocultarMensagem();
        }

        // ABRIR DETALHES
        function abrirDetalhes(protocolo) {
            protocoloAtual = protocolo;
            document.getElementById('modal_protocolo').textContent = protocolo.PROTOCOLO;
            document.getElementById('modal_status').textContent = protocolo.STATUS || 'ABERTO';
            document.getElementById('modal_data').textContent = protocolo.DATA || 'N/A';
            document.getElementById('modal_solicitante').textContent = protocolo.SOLICITANTE || 'N/A';
            document.getElementById('modal_endereco').textContent = protocolo.ENDERECO || 'N/A';
            document.getElementById('modal_bairro').textContent = protocolo.BAIRRO || 'N/A';
            document.getElementById('modal_referencia').textContent = protocolo.REFERENCIA || 'N/A';
            document.getElementById('modal_cpf').textContent = protocolo.CPF || 'N/A';
            document.getElementById('modal_tipo_servico').textContent = protocolo.SERVICO || 'N/A';
            document.getElementById('modal_detalhes').textContent = protocolo.DETALHES || 'Nenhum detalhe adicional';
            document.getElementById('modal_observacoes').textContent = protocolo.OBSERVACOES || 'Nenhuma observação';
            
            const tel = (protocolo.TELEFONE || '').replace(/\D/g, '');
            const telLink = document.getElementById('modal_telefone_link');
            telLink.href = `tel:${tel}`;
            telLink.textContent = protocolo.TELEFONE || 'N/A';
            
            document.getElementById('modalDetalhes').classList.remove('hidden');
        }

        // FECHAR MODAL DETALHES
        function fecharModal() {
            document.getElementById('modalDetalhes').classList.add('hidden');
            protocoloAtual = null;
        }

        // ABRIR MOTIVO DEVOLUÇÃO
        function abrirMotivoDevolucao() {
            document.getElementById('motivoDevolucao').value = '';
            document.getElementById('modalMotivoDevolucao').classList.remove('hidden');
        }

        // FECHAR MOTIVO DEVOLUÇÃO
        function fecharMotivoDevolucao() {
            document.getElementById('modalMotivoDevolucao').classList.add('hidden');
        }

        // ABRIR MOTIVO CANCELAMENTO
        function abrirMotivoCancelamento() {
            document.getElementById('motivoCancelamento').value = '';
            document.getElementById('modalMotivoCancelamento').classList.remove('hidden');
        }

        // FECHAR MOTIVO CANCELAMENTO
        function fecharMotivoCancelamento() {
            document.getElementById('modalMotivoCancelamento').classList.add('hidden');
        }

        // MUDAR STATUS
        async function mudarStatus(novoStatus) {
            if (!protocoloAtual) return;

            let statusFinal = novoStatus;

            if (novoStatus === 'DEVOLVIDO') {
                const motivo = document.getElementById('motivoDevolucao').value.trim();
                if (!motivo) {
                    alert('Por favor, descreva o motivo da devolução.');
                    return;
                }
                statusFinal = 'DEVOLVIDO';
            } else if (novoStatus === 'CANCELADO') {
                const motivo = document.getElementById('motivoCancelamento').value.trim();
                if (!motivo) {
                    alert('Por favor, descreva o motivo do cancelamento.');
                    return;
                }
                statusFinal = 'CANCELADO';
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'updateStatus',
                        tab: 'COM FUNCIONÁRIO',
                        protocolId: protocoloAtual.PROTOCOLO,
                        newStatus: statusFinal,
                        username: usuarioAtual,
                        role: localStorage.getItem('role')
                    })
                });

                const result = await response.json();
                if (result.success) {
                    // Fechar modais
                    fecharModal();
                    fecharMotivoDevolucao();
                    fecharMotivoCancelamento();

                    // Mostrar mensagem de sucesso
                    exibirMensagem(`✅ Protocolo marcado como ${statusFinal}. Atualizando...`);

                    // Aguardar 1 segundo e recarregar
                    setTimeout(() => {
                        carregarProtocolos();
                    }, 1000);
                } else {
                    alert('Erro: ' + result.error);
                }
            } catch (err) {
                console.error('Erro ao atualizar status:', err);
                alert('Erro ao conectar com o servidor.');
            }
        }

        // EXIBIR MENSAGEM
        function exibirMensagem(texto) {
            const msg = document.getElementById('mensagem');
            const msgTexto = document.getElementById('textoMensagem');
            msgTexto.textContent = texto;
            msg.classList.remove('hidden');
            setTimeout(() => ocultarMensagem(), 4000);
        }

        // OCULTAR MENSAGEM
        function ocultarMensagem() {
            document.getElementById('mensagem').classList.add('hidden');
        }

        // LOGOUT
        function fazerLogout() {
            localStorage.removeItem('user');
            localStorage.removeItem('role');
            ocultarDashboard();
            document.getElementById('user').value = '';
            document.getElementById('pass').value = '';
        }

        // EVENT LISTENERS
        document.getElementById('filtroProtocolo').addEventListener('keyup', carregarProtocolos);
        document.getElementById('filtroBairro').addEventListener('change', carregarProtocolos);

        // ENTER para login
        document.getElementById('pass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fazerLogin();
        });
    </script>

</body>
